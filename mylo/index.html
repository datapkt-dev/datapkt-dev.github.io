<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYLO</title>
    <script type="module" crossorigin src="./assets/index-cXlvhlzc.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-e5pb7pWp.css">
  </head>
  <body data-login-target="#/contract/active">
    <div id="app"></div>
    <script>
      (() => {
        const targetHash = document.body.dataset.loginTarget || '#/contract/active';
        const pendingTargetHash = sessionStorage.getItem('myloLoginBypassTarget');

        if (pendingTargetHash) {
          sessionStorage.removeItem('myloLoginBypassTarget');
          if (location.hash !== pendingTargetHash) {
            location.replace(`${location.href.split('#')[0]}${pendingTargetHash}`);
          }
        }

        const bypassLogin = () => {
          const mockUser = { name: 'MYLO 使用者', role: 'demo', token: 'mock-login-token' };
          localStorage.setItem('isLogin', 'true');
          localStorage.setItem('userInfo', JSON.stringify(mockUser));
          localStorage.setItem('AccessToken', mockUser.token);
          
          // 延遲刷新以確保 localStorage 已設定
          setTimeout(() => {
            location.reload();
          }, 100);
        };

        // 攔截登入按鈕點擊
        document.addEventListener(
          'click',
          (event) => {
            const loginButton = event.target.closest('.login-btn');
            if (!loginButton) return;
            console.log('Login button clicked');
            event.preventDefault();
            event.stopImmediatePropagation();
            bypassLogin();
          },
          true,
        );

        // 如果按鈕尚未載入，添加觀察器
        const observer = new MutationObserver(() => {
          const loginBtn = document.querySelector('.login-btn');
          if (loginBtn && !loginBtn._mockLoginAttached) {
            loginBtn._mockLoginAttached = true;
            loginBtn.addEventListener('click', (e) => {
              console.log('Direct login button click detected');
              e.preventDefault();
              e.stopPropagation();
              bypassLogin();
            });
          }
        });

        observer.observe(document.body, { childList: true, subtree: true, attributes: false });
      })();
    </script>
  </body>
</html>
